name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (fmt + clippy + dep graph)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  desktop:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Labels pinned on purpose: GitHub runner images are migrating through
        # 2026 and `-latest` moves under you. macos-latest is Apple Silicon.
        os: [ubuntu-24.04, windows-2025, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # cpal needs ALSA headers to build; golden tests need a software
      # Vulkan adapter (lavapipe) and the smoke run needs an X server.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev mesa-vulkan-drivers xvfb
      - name: Tests (Linux — golden images required)
        if: runner.os == 'Linux'
        run: cargo test --workspace
        env:
          TRINO_REQUIRE_GPU: "1"
      - name: Tests (Windows/macOS — golden skipped if no adapter)
        if: runner.os != 'Linux'
        run: cargo test --workspace
      - run: cargo build -p trino-app-pc
      - run: cargo build -p trino-app-pc --features reload
      - run: cargo build -p trino-editor
      - name: Smoke run (Linux, headless)
        if: runner.os == 'Linux'
        run: TRINO_SMOKE_FRAMES=60 xvfb-run -a cargo run -p trino-app-pc
      - name: Editor smoke (Linux, headless)
        if: runner.os == 'Linux'
        run: TRINO_EDITOR_SMOKE_FRAMES=30 xvfb-run -a cargo run -p trino-editor

  hot-reload:
    name: Hot reload E2E
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Builds the game dylib twice and swaps them under a live state.
      - run: cargo test -p xtask --test hot_reload -- --ignored

  n64:
    name: N64 ROM (libdragon container)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # xtask itself builds on stable (rust-toolchain.toml); the MIPS target
      # build is invoked as `cargo +nightly` with build-std, hence rust-src.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The toolchain image compiles libdragon from a pinned commit (~10 min);
      # cache the built image keyed on the Dockerfile.
      - name: Cache toolchain image
        id: image-cache
        uses: actions/cache@v4
        with:
          path: ~/trino-n64.tar
          key: trino-n64-image-${{ hashFiles('docker/n64/Dockerfile') }}
      - name: Load cached toolchain image
        if: steps.image-cache.outputs.cache-hit == 'true'
        run: docker load -i ~/trino-n64.tar
      - name: Build ROM
        run: cargo xtask build n64
      - name: Save toolchain image
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: docker save trino-n64 -o ~/trino-n64.tar
      - name: ROM produced
        run: ls -l target/n64/trino.z64
      # Emulator tests (`cargo xtask test n64`) run locally with ares for now:
      # ares ships no Linux release binary. Candidate follow-up: build ares
      # once in a cached step (or use a libretro core) and run under xvfb.

  n3ds:
    name: 3DS app (devkitARM container)
    runs-on: ubuntu-24.04
    container: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
      # The image ships devkitARM + libctru/citro2d/citro3d + tools at
      # /opt/devkitpro; only Rust is missing. rust-toolchain.toml pulls
      # stable for xtask; the target build is `cargo +nightly` w/ build-std.
      - name: Install Rust (nightly + rust-src)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain nightly --component rust-src
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - uses: Swatinem/rust-cache@v2
      - name: Build .3dsx
        run: cargo xtask build 3ds
      - name: App produced
        run: ls -l target/3ds/trino.3dsx
      # Emulator tests (`cargo xtask test 3ds`) run locally with Azahar for
      # now (GUI app; the harness tails its log for the magic strings).
